<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Practice Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/ui-system.css') }}" rel="stylesheet">
<script>
function createQuestionCard(index){
  return `
  <div class="quiz-editor-card">
    <div class="fw-semibold mb-2">Question ${index + 1}</div>
    <textarea class="form-control mb-2" name="question_text[]" rows="3" placeholder="Enter question text" required></textarea>
    <input class="form-control mb-2" type="file" name="question_image[]" accept="image/*">
    <textarea class="form-control mb-2" name="explanation[]" rows="2" placeholder="Explanation (optional)"></textarea>

    <label class="option-line mb-2"><input type="radio" name="correct_option_${index}" value="A" required><span>A</span><input type="text" name="option_A_${index}" placeholder="Option A" required></label>
    <label class="option-line mb-2"><input type="radio" name="correct_option_${index}" value="B"><span>B</span><input type="text" name="option_B_${index}" placeholder="Option B" required></label>
    <label class="option-line mb-2"><input type="radio" name="correct_option_${index}" value="C"><span>C</span><input type="text" name="option_C_${index}" placeholder="Option C" required></label>
    <label class="option-line"><input type="radio" name="correct_option_${index}" value="D"><span>D</span><input type="text" name="option_D_${index}" placeholder="Option D" required></label>

    <button type="button" class="btn btn-outline-danger w-100 mt-2" onclick="removeQuestion(this)">Remove Question</button>
  </div>`;
}

function reindexQuestions(){
  const cards = document.querySelectorAll('#questions .quiz-editor-card');
  cards.forEach((card, idx) => {
    card.querySelector('.fw-semibold').textContent = `Question ${idx + 1}`;
    card.querySelectorAll('input[type="radio"]').forEach((r) => { r.name = `correct_option_${idx}`; });
    ['A','B','C','D'].forEach((label) => {
      const txt = card.querySelector(`input[name^="option_${label}_"]`);
      if (txt) txt.name = `option_${label}_${idx}`;
    });
  });
}

function addQuestion(){
  const holder = document.getElementById('questions');
  const idx = holder.querySelectorAll('.quiz-editor-card').length;
  holder.insertAdjacentHTML('beforeend', createQuestionCard(idx));
}

function removeQuestion(btn){
  btn.closest('.quiz-editor-card').remove();
  reindexQuestions();
}

function validateForm(){
  const title = document.getElementById('title').value.trim();
  const cards = document.querySelectorAll('#questions .quiz-editor-card');
  const selectedDepartments = document.querySelectorAll('input[name="departments"]:checked');

  if (!title){ Swal.fire('Error','Please enter quiz title','error'); return false; }
  if (selectedDepartments.length === 0){ Swal.fire('Error','Select at least one department','error'); return false; }
  if (cards.length === 0){ Swal.fire('Error','Add at least one question','error'); return false; }

  for (let i=0;i<cards.length;i++){
    const qText = cards[i].querySelector('textarea[name="question_text[]"]').value.trim();
    if (!qText){ Swal.fire('Error',`Question ${i+1} is empty`,'error'); return false; }
    const checked = cards[i].querySelector(`input[name="correct_option_${i}"]:checked`);
    if (!checked){ Swal.fire('Error',`Select correct option for Question ${i+1}`,'error'); return false; }
  }
  return true;
}

document.addEventListener('DOMContentLoaded', () => {
  if (!document.querySelector('#questions .quiz-editor-card')) addQuestion();
});

function addQuestionsToForm(questions) {
  const holder = document.getElementById('questions');
  const isFieldBlank = (el) => {
    if (!el) return true;
    const v = el.value.trim();
    if (!v) return true;
    const ph = el.getAttribute('placeholder');
    return ph ? v === ph.trim() : false;
  };
  const isCardEmpty = (card) => {
    const qInput = card.querySelector('textarea[name="question_text[]"]');
    const explanation = card.querySelector('textarea[name="explanation[]"]');
    const qBlank = isFieldBlank(qInput);
    const expBlank = isFieldBlank(explanation);
    const optionInputs = card.querySelectorAll('input[type="text"][name^="option_"]');
    const optionsEmpty = Array.from(optionInputs).every((inp) => isFieldBlank(inp));
    // Treat default-selected radio as empty if no content entered.
    return qBlank && expBlank && optionsEmpty;
  };
  let emptyCards = Array.from(holder.querySelectorAll('.quiz-editor-card')).filter(isCardEmpty);

  for (const q of questions) {
    let card = emptyCards.shift();
    if (!card) {
      addQuestion();
      const cards = holder.querySelectorAll('.quiz-editor-card');
      card = cards[cards.length - 1];
    }

    const qInput = card.querySelector('textarea[name="question_text[]"]');
    if (qInput) qInput.value = q.question;

    const expInput = card.querySelector('textarea[name="explanation[]"]');
    if (expInput && q.explanation) expInput.value = q.explanation;

    q.options.forEach((optText, idx) => {
      const optLabel = ['A','B','C','D'][idx];
      const optInput = card.querySelector(`input[name^="option_${optLabel}_"]`);
      if (optInput) optInput.value = optText;
    });

    const correctRadio = card.querySelector(`input[type="radio"][value="${q.correct_option}"]`);
    if (correctRadio) correctRadio.checked = true;
  }
}

async function importMcqFile() {
  const fileInput = document.getElementById('mcq_file');
  const statusEl = document.getElementById('mcq_status');
  const file = fileInput.files[0];

  if (!file) {
    Swal.fire('Error', 'Please attach an MCQ file', 'error');
    return;
  }

  statusEl.textContent = 'Importing...';
  try {
    const formData = new FormData();
    formData.append('mcq_file', file);
    const response = await fetch('/api/quiz/import-mcq', { method: 'POST', body: formData });
    const data = await response.json();
    if (!response.ok || !data.ok) {
      throw new Error(data.error || 'Failed to import MCQ file');
    }

    addQuestionsToForm(data.questions || []);
    statusEl.textContent = `✅ Imported ${data.questions.length} questions`;
    Swal.fire('Success', `Imported ${data.questions.length} questions.`, 'success');
    fileInput.value = '';
  } catch (error) {
    statusEl.textContent = '❌ Error';
    Swal.fire('Error', error.message || 'Failed to import MCQ file.', 'error');
  } finally {
    setTimeout(() => { statusEl.textContent = ''; }, 5000);
  }
}

async function generateAIGeneratedQuestions() {
  const topic = document.getElementById('ai_topic').value.trim();
  const numQuestions = parseInt(document.getElementById('ai_num_questions').value);
  const difficulty = document.getElementById('ai_difficulty').value;
  const notesText = document.getElementById('ai_notes').value.trim();
  const notesFile = document.getElementById('ai_notes_file').files[0];
  const generateBtn = document.getElementById('generate_btn');
  const btnText = document.getElementById('btn_text');
  const statusEl = document.getElementById('ai_status');

  if (!topic && !notesText && !notesFile) {
    Swal.fire('Error', 'Please enter a topic or provide notes/text/file', 'error');
    return;
  }

  // Disable button and show loading
  generateBtn.disabled = true;
  btnText.textContent = 'Generating...';
  statusEl.textContent = '⏳ Generating questions...';

  try {
    const formData = new FormData();
    formData.append('topic', topic);
    formData.append('num_questions', numQuestions);
    formData.append('difficulty', difficulty);
    formData.append('notes_text', notesText);
    if (notesFile) formData.append('notes_file', notesFile);

    const response = await fetch('/api/ai/generate-questions', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (!response.ok || !data.ok) {
      throw new Error(data.error || 'Failed to generate questions');
    }

    addQuestionsToForm(data.questions || []);
    statusEl.textContent = `✅ Added ${data.questions.length} questions!`;
    Swal.fire('Success', `Generated and added ${data.questions.length} questions to the form.`, 'success');

    // Clear inputs
    document.getElementById('ai_topic').value = '';
    document.getElementById('ai_notes').value = '';
    document.getElementById('ai_notes_file').value = '';

  } catch (error) {
    console.error('AI generation error:', error);
    statusEl.textContent = '❌ Error';
    Swal.fire('Error', error.message || 'Failed to generate questions. Please try again.', 'error');
  } finally {
    // Re-enable button
    generateBtn.disabled = false;
    btnText.textContent = 'Generate Questions';
    
    // Clear status after 5 seconds
    setTimeout(() => {
      statusEl.textContent = '';
    }, 5000);
  }
}
</script>
</head>
<body class="app-bg">
<nav class="navbar navbar-expand-lg topbar">
    <div class="container-fluid">
        <span class="navbar-brand">Create Practice Quiz</span>
        <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-outline-primary btn-sm">Back to Dashboard</a>
    </div>
</nav>

<div class="page-wrap">
  <div class="section-hero mb-3">
      <h1>Create Practice Quiz</h1>
      <p>Build department-targeted modules with consistent game-style presentation.</p>
  </div>

  <!-- AI Question Generator Section -->
  <div class="glass-card p-4 mb-4">
      <h5 class="mb-3">🤖 AI Question Generator</h5>
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
              <label class="form-label" for="ai_topic">Topic</label>
              <input type="text" class="form-control" id="ai_topic" placeholder="e.g., Photosynthesis, Quadratic Equations, World War II">
          </div>
          <div class="col-md-2">
              <label class="form-label" for="ai_num_questions">Number of Questions</label>
              <select class="form-select" id="ai_num_questions">
                  <option value="1">1</option>
                  <option value="3">3</option>
                  <option value="5" selected>5</option>
                  <option value="10">10</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
              </select>
          </div>
          <div class="col-md-2">
              <label class="form-label" for="ai_difficulty">Difficulty</label>
              <select class="form-select" id="ai_difficulty">
                  <option value="easy">Easy</option>
                  <option value="medium" selected>Medium</option>
                  <option value="hard">Hard</option>
              </select>
          </div>
          <div class="col-md-2">
              <button type="button" class="btn btn-primary w-100" id="generate_btn" onclick="generateAIGeneratedQuestions()">
                  <span id="btn_text">Generate Questions</span>
              </button>
          </div>
            <div class="col-md-2">
                <small class="text-muted" id="ai_status"></small>
            </div>
        </div>
        <div class="row g-3 mt-1">
            <div class="col-md-8">
                <label class="form-label" for="ai_notes">Notes / Text (optional)</label>
                <textarea class="form-control" id="ai_notes" rows="3" placeholder="Paste your notes here to generate questions from your content."></textarea>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="ai_notes_file">Attach Notes File (.txt, .docx, .pdf)</label>
                <input type="file" class="form-control" id="ai_notes_file" accept=".txt,.docx,.pdf">
                <small class="text-muted">Optional</small>
            </div>
        </div>
  </div>

  <div class="glass-card p-4 mb-4">
      <h5 class="mb-3">Import MCQ File</h5>
      <div class="row g-3 align-items-end">
          <div class="col-md-8">
              <label class="form-label" for="mcq_file">MCQ File (.csv, .json, .xlsx, .txt, .docx, .pdf)</label>
              <input type="file" class="form-control" id="mcq_file" accept=".csv,.json,.xlsx,.txt,.docx,.pdf">
              <small class="text-muted">Columns: question, option_a, option_b, option_c, option_d, correct_option, explanation (optional)</small>
          </div>
          <div class="col-md-2 d-grid">
              <button type="button" class="btn btn-outline-primary" onclick="importMcqFile()">Import MCQ</button>
          </div>
          <div class="col-md-2">
              <small class="text-muted" id="mcq_status"></small>
          </div>>
      </div>
  </div>

  <div class="glass-card p-4 module-form">
    <form method="POST" onsubmit="return validateForm()" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label" for="title">Quiz Title</label>
        <input id="title" type="text" class="form-control" name="title" placeholder="Operating Systems Practice" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" class="form-control" name="description" rows="2" placeholder="Optional description"></textarea>
      </div>

      <label class="form-label mb-2">Target Departments</label>
      <div class="d-flex flex-wrap gap-3 mb-3">
        <label class="form-check"><input class="form-check-input" type="checkbox" name="departments" value="Computer"> Computer</label>
        <label class="form-check"><input class="form-check-input" type="checkbox" name="departments" value="Mechanical"> Mechanical</label>
        <label class="form-check"><input class="form-check-input" type="checkbox" name="departments" value="Electrical"> Electrical</label>
        <label class="form-check"><input class="form-check-input" type="checkbox" name="departments" value="Civil"> Civil</label>
      </div>

      <div id="questions" class="d-grid gap-3"></div>

      <div class="d-grid gap-2 mt-3">
        <button type="button" class="btn btn-outline-primary" onclick="addQuestion()">+ Add Question</button>
        <button type="submit" class="btn btn-brand">Save Practice Quiz</button>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</body>
</html>
